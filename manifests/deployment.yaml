apiVersion: apps/v1
kind: Deployment
metadata:
  name: targeting-service
  namespace: togglemaster-targeting
  labels:
    app.kubernetes.io/name: targeting-service
    app.kubernetes.io/component: targeting
    app.kubernetes.io/part-of: togglemaster
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: targeting-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: targeting-service
        app.kubernetes.io/component: targeting
        app.kubernetes.io/part-of: togglemaster
    spec:
      initContainers:
        - name: build-db-url
          image: python:3.12-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              python3 << 'EOF'
              import urllib.parse
              import os

              user = os.environ.get('DB_USER', '')
              password = os.environ.get('DB_PASSWORD', '')
              host = os.environ.get('DB_HOST', '')
              port = os.environ.get('DB_PORT', '5432')
              dbname = os.environ.get('DB_NAME', '')

              encoded_user = urllib.parse.quote(user, safe='')
              encoded_password = urllib.parse.quote(password, safe='')

              db_url = f"postgresql://{encoded_user}:{encoded_password}@{host}:{port}/{dbname}?sslmode=require"

              with open('/shared/database_url', 'w') as f:
                  f.write(db_url)

              print(f"DATABASE_URL criada para host: {host}")
              EOF
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: targeting-service-config
                  key: TARGETING_DB_HOST
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: targeting-service-config
                  key: TARGETING_DB_NAME
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: targeting-service-config
                  key: TARGETING_DB_PORT
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: targeting-service-rds
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: targeting-service-rds
                  key: password
          volumeMounts:
            - name: shared-data
              mountPath: /shared

      containers:
        - name: targeting-service
          image: 637423306132.dkr.ecr.us-east-1.amazonaws.com/togglemaster/targeting-service:2c0060d8ed9b402b229642784c0af1ec011176e3
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8003
              protocol: TCP
          command: ["/bin/sh", "-c"]
          args:
            - |
              export DATABASE_URL=$(cat /shared/database_url)
              exec gunicorn --bind 0.0.0.0:8003 --workers 4 --timeout 60 app:app
          env:
            - name: PORT
              value: "8003"
            - name: APP_ENV
              value: "production"
            - name: AUTH_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: targeting-service-config
                  key: AUTH_SERVICE_URL
            - name: FLAG_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: targeting-service-config
                  key: FLAG_SERVICE_URL
          volumeMounts:
            - name: shared-data
              mountPath: /shared
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi

      volumes:
        - name: shared-data
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: targeting-service
      terminationGracePeriodSeconds: 30
      restartPolicy: Always